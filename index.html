<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單登記系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="order-container">
    <h2>📋 訂單登記</h2>
    <p class="subtitle">請填寫下方欄位以同步至雲端試算表</p>
    <hr class="divider">

    <div class="form-group">
      <label for="assigneeSelect">👤 負責人</label>
      <select id="assigneeSelect">
        <option value="" disabled selected>請選擇負責人...</option>
        <option value="松禾木">松禾木 (Owner)</option>
        <option value="操作員A">操作員A</option>
        <option value="操作員B">操作員B</option>
        <option value="操作員C">操作員C</option>
        <option value="操作員D">操作員D</option>
      </select>
    </div>

    <div class="form-group">
      <label for="platformSelect">🌐 下單平台</label>
      <select id="platformSelect">
        <option value="" disabled selected>請選擇來源平台...</option>
        <option value="官方網站">官方網站</option>
        <option value="蝦皮購物">蝦皮購物</option>
        <option value="LINE@">LINE@</option>
        <option value="現場臨櫃/面交">現場臨櫃 / 面交</option>
      </select>
    </div>

    <div class="form-group">
      <label for="customerAccountInput">🔑 客戶帳號 / ID</label>
      <input type="text" id="customerAccountInput" placeholder="請輸入客戶的帳號、電話或姓名...">
    </div>

    <div class="form-group">
      <label for="noteInput">✍️ 訂單備註</label>
      <input type="text" id="noteInput" placeholder="請輸入訂單細節、品項或客戶要求...">
    </div>

    <button id="submitBtn" onclick="submitOrder()">確認送出訂單</button>

    <div id="statusBar" class="status-bar">⏳ 準備就緒</div>
  </div>

  <script src="index.js"></script>
</body>
</html>
